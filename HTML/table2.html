<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Voucher</h1>
    <table cellspacing="0" cellpadding="30" border="1">
        <thead>
            <tr>
                <th>#</th>
                <th>Item Name</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>3D</td>
                <td>1300</td>
                <td>1</td>
                <td>1300</td>
            </tr>
            <tr>
                <td>2</td>
                <td>MaMa</td>
                <td>650</td>
                <td>1</td>
                <td>650</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Egg</td>
                <td>300</td>
                <td>1</td>
                <td>300</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Coca Cola</td>
                <td>1000</td>
                <td>1</td>
                <td>1000</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Premier</td>
                <td>100</td>
                <td>1</td>
                <td>100</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="4" align="center">total</td>
                <td>50000</td>
            </tr>
        </tfoot>
    </table>

    <h1>Save Money</h1>
    <table border="1" cellspacing="0" cellpadding="20">
        <thead>
            <tr>
                <th>Month</th>
                <th>Save Money</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>January</td>
                <td>400000</td>
                <td rowspan="3">59000000</td>
            </tr>
            <tr>
                <td>February</td>
                <td>5000000</td>
            </tr>
            <tr>
                <td>March</td>
                <td>490000</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
